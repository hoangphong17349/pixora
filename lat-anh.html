<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lật & Xoay Ảnh</title>
<style>
  :root{
    --ink:#1c1a17;
    --paper:#f6f2ea;
    --line:#d9d0c1;
    --accent:#b5502f;
    --accent-ink:#fff8ef;
    --panel:#efe9dd;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Courier New', ui-monospace, monospace;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:32px 16px 60px;
  }
  h1{
    font-size:20px;
    letter-spacing:2px;
    text-transform:uppercase;
    margin:0 0 4px;
    border-bottom:2px solid var(--ink);
    padding-bottom:10px;
    width:100%;
    max-width:560px;
    text-align:center;
  }
  .sub{
    font-size:12px;
    color:#6b6154;
    margin-bottom:24px;
    text-align:center;
  }
  .stage-wrap{
    width:100%;
    max-width:560px;
    background:var(--panel);
    border:1px solid var(--line);
    padding:16px;
  }
  .stage{
    width:100%;
    aspect-ratio:4/3;
    background:
      linear-gradient(45deg,#e2dbca 25%,transparent 25%) -10px 0/20px 20px,
      linear-gradient(-45deg,#e2dbca 25%,transparent 25%) -10px 0/20px 20px,
      linear-gradient(45deg,transparent 75%,#e2dbca 75%) -10px 0/20px 20px,
      linear-gradient(-45deg,transparent 75%,#e2dbca 75%) -10px 0/20px 20px;
    background-color:#fbf9f4;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
  }
  .stage img{
    max-width:100%;
    max-height:100%;
    transition:transform .25s ease;
    user-select:none;
    -webkit-user-drag:none;
  }
  .placeholder{
    font-size:12px;
    color:#9a8f7c;
    text-align:center;
    padding:20px;
    line-height:1.6;
  }
  .drop-hint{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1px;
  }
  input[type=file]{ display:none; }

  .controls{
    width:100%;
    max-width:560px;
    margin-top:14px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
  }
  button{
    font-family:inherit;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.5px;
    background:var(--ink);
    color:var(--accent-ink);
    border:none;
    padding:12px 6px;
    cursor:pointer;
    transition:background .15s ease, transform .1s ease;
  }
  button:hover{ background:var(--accent); }
  button:active{ transform:scale(.96); }
  button.wide{ grid-column:span 2; }
  button.ghost{
    background:transparent;
    color:var(--ink);
    border:1px solid var(--ink);
  }
  button.ghost:hover{ background:var(--ink); color:var(--accent-ink); }
  button.load{
    grid-column:span 4;
    background:var(--accent);
    color:var(--accent-ink);
    padding:14px;
  }
  button.load:hover{ background:#8f3d22; }
  button:disabled{
    opacity:.35;
    cursor:not-allowed;
  }
  button:disabled:hover{ background:var(--ink); }

  .readout{
    width:100%;
    max-width:560px;
    margin-top:14px;
    font-size:11px;
    color:#6b6154;
    display:flex;
    justify-content:space-between;
    border-top:1px dashed var(--line);
    padding-top:10px;
  }
  .footer-actions{
    width:100%;
    max-width:560px;
    margin-top:8px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }
</style>
</head>
<body>

<h1>Lật &amp; Xoay Ảnh</h1>
<div class="sub">Flip and rotate tool (công cụ lật &amp; xoay ảnh) — xử lý ngay trên trình duyệt, không tải lên máy chủ</div>

<div class="stage-wrap">
  <div class="stage" id="stage">
    <div class="placeholder" id="placeholder">
      Chưa có ảnh<br>
      <span class="drop-hint">Kéo thả ảnh vào đây hoặc bấm nút bên dưới</span>
    </div>
    <img id="img" style="display:none;">
  </div>
</div>

<input type="file" id="fileInput" accept="image/*">

<div class="controls">
  <button class="load" id="loadBtn">📁 Chọn ảnh (choose image)</button>

  <button id="flipH">⇋ Lật trái–phải</button>
  <button id="flipV">⇅ Lật trên–dưới</button>
  <button id="rotL">↺ Xoay 90° trái</button>
  <button id="rotR">↻ Xoay 90° phải</button>

  <button class="wide" id="rot180">⟲ Xoay 180°</button>
  <button class="wide ghost" id="reset">Đặt lại (reset)</button>
</div>

<div class="readout">
  <span id="stateH">Lật ngang: Tắt</span>
  <span id="stateV">Lật dọc: Tắt</span>
  <span id="stateR">Góc xoay: 0°</span>
</div>

<div class="footer-actions">
  <button class="ghost" id="downloadBtn" disabled>⬇ Tải ảnh về (download)</button>
  <button class="ghost" id="clearBtn" disabled>✕ Xoá ảnh (clear)</button>
</div>

<script>
const stage = document.getElementById('stage');
const img = document.getElementById('img');
const placeholder = document.getElementById('placeholder');
const fileInput = document.getElementById('fileInput');
const loadBtn = document.getElementById('loadBtn');
const downloadBtn = document.getElementById('downloadBtn');
const clearBtn = document.getElementById('clearBtn');

let flipH = false;
let flipV = false;
let rotation = 0; // độ (degrees), theo chiều kim đồng hồ

function updateTransform(){
  const sx = flipH ? -1 : 1;
  const sy = flipV ? -1 : 1;
  img.style.transform = `rotate(${rotation}deg) scale(${sx}, ${sy})`;

  document.getElementById('stateH').textContent = 'Lật ngang: ' + (flipH ? 'Bật' : 'Tắt');
  document.getElementById('stateV').textContent = 'Lật dọc: ' + (flipV ? 'Bật' : 'Tắt');
  document.getElementById('stateR').textContent = 'Góc xoay: ' + ((rotation % 360 + 360) % 360) + '°';
}

function loadFile(file){
  if(!file || !file.type.startsWith('image/')) return;
  const url = URL.createObjectURL(file);
  img.src = url;
  img.style.display = 'block';
  placeholder.style.display = 'none';
  flipH = false; flipV = false; rotation = 0;
  updateTransform();
  downloadBtn.disabled = false;
  clearBtn.disabled = false;
}

loadBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => loadFile(e.target.files[0]));

stage.addEventListener('dragover', e => { e.preventDefault(); stage.style.opacity = .8; });
stage.addEventListener('dragleave', () => { stage.style.opacity = 1; });
stage.addEventListener('drop', e => {
  e.preventDefault();
  stage.style.opacity = 1;
  loadFile(e.dataTransfer.files[0]);
});

document.getElementById('flipH').addEventListener('click', () => { flipH = !flipH; updateTransform(); });
document.getElementById('flipV').addEventListener('click', () => { flipV = !flipV; updateTransform(); });
document.getElementById('rotL').addEventListener('click', () => { rotation -= 90; updateTransform(); });
document.getElementById('rotR').addEventListener('click', () => { rotation += 90; updateTransform(); });
document.getElementById('rot180').addEventListener('click', () => { rotation += 180; updateTransform(); });

document.getElementById('reset').addEventListener('click', () => {
  flipH = false; flipV = false; rotation = 0;
  updateTransform();
});

clearBtn.addEventListener('click', () => {
  img.src = '';
  img.style.display = 'none';
  placeholder.style.display = 'block';
  downloadBtn.disabled = true;
  clearBtn.disabled = true;
  fileInput.value = '';
});

downloadBtn.addEventListener('click', () => {
  if(!img.src) return;

  const norm = ((rotation % 360) + 360) % 360;
  const swapDims = (norm === 90 || norm === 270);

  const tempImg = new Image();
  tempImg.onload = () => {
    const w = tempImg.naturalWidth;
    const h = tempImg.naturalHeight;
    const canvas = document.createElement('canvas');
    canvas.width = swapDims ? h : w;
    canvas.height = swapDims ? w : h;
    const ctx = canvas.getContext('2d');

    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.rotate(norm * Math.PI / 180);
    ctx.scale(flipH ? -1 : 1, flipV ? -1 : 1);
    ctx.drawImage(tempImg, -w / 2, -h / 2, w, h);

    canvas.toBlob(blob => {
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'anh-da-chinh-sua.png';
      link.click();
    }, 'image/png');
  };
  tempImg.src = img.src;
});
</script>

</body>
</html>
