<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công Cụ Cắt Ảnh</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --background: #0f172a;
            --surface: #1e293b;
            --surface-light: #334155;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: rgba(148, 163, 184, 0.2);
            --success: #10b981;
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--background);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 40%);
            animation: glow 20s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes glow {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(5%, 5%) rotate(180deg); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        .image-section {
            background: var(--surface);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .image-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.5;
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(99, 102, 241, 0.03);
            position: relative;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.08);
            transform: translateY(-2px);
        }

        .upload-area.has-image {
            display: none;
        }

        .upload-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.7;
        }

        .upload-text {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .upload-hint {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        #fileInput {
            display: none;
        }

        .image-wrapper {
            display: none;
            max-width: 100%;
        }

        .image-wrapper.active {
            display: block;
        }

        #image {
            max-width: 100%;
            max-height: 600px;
            display: block;
            border-radius: 12px;
        }

        .controls {
            background: var(--surface);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .control-group {
            animation: slideInRight 0.5s ease both;
        }

        .control-group:nth-child(1) { animation-delay: 0.3s; }
        .control-group:nth-child(2) { animation-delay: 0.4s; }
        .control-group:nth-child(3) { animation-delay: 0.5s; }

        .control-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .btn {
            width: 100%;
            padding: 1rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn span {
            position: relative;
            z-index: 1;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--surface-light);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--surface);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .result-section {
            margin-top: 3rem;
            display: none;
            animation: fadeInUp 0.8s ease;
        }

        .result-section.active {
            display: block;
        }

        .result-title {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: var(--text);
            font-weight: 600;
        }

        .result-content {
            background: var(--surface);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .result-content img {
            max-width: 100%;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .download-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: var(--success);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .download-link:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }

        .stats {
            background: var(--surface-light);
            border-radius: 12px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: var(--text-secondary);
        }

        .stat-value {
            color: var(--text);
            font-weight: 600;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem 0.5rem;
            }

            h1 {
                font-size: 2rem;
            }

            .image-section,
            .controls,
            .result-content {
                padding: 1.5rem;
            }
        }

        /* Custom Cropper.js styling */
        .cropper-view-box,
        .cropper-face {
            background: rgba(99, 102, 241, 0.1);
        }

        .cropper-line,
        .cropper-point {
            background-color: var(--primary);
        }

        .cropper-point {
            width: 8px;
            height: 8px;
            opacity: 0.8;
        }

        .cropper-point.point-se {
            width: 12px;
            height: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✂️ Cắt Ảnh</h1>
            <p class="subtitle">Công cụ chỉnh sửa ảnh chuyên nghiệp</p>
        </header>

        <div class="main-grid">
            <div class="image-section">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📸</div>
                    <div class="upload-text">Kéo thả ảnh vào đây</div>
                    <div class="upload-hint">hoặc nhấn để chọn file</div>
                    <input type="file" id="fileInput" accept="image/*">
                </div>

                <div class="image-wrapper" id="imageWrapper">
                    <img id="image" src="">
                </div>
            </div>

            <div class="controls">
                <div class="control-group">
                    <div class="control-title">Thao tác</div>
                    <button class="btn btn-primary" id="cropBtn" disabled>
                        <span>✂️ Cắt ảnh</span>
                    </button>
                </div>

                <div class="control-group">
                    <button class="btn btn-secondary" id="resetBtn" disabled>
                        <span>🔄 Đặt lại</span>
                    </button>
                </div>

                <div class="control-group">
                    <div class="stats" id="imageStats" style="display: none;">
                        <div class="stat-item">
                            <span class="stat-label">Kích thước gốc</span>
                            <span class="stat-value" id="originalSize">-</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Trạng thái</span>
                            <span class="stat-value" id="status">Chờ tải ảnh</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="result-section" id="resultSection">
            <h2 class="result-title">✨ Kết quả</h2>
            <div class="result-content" id="result"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const imageWrapper = document.getElementById('imageWrapper');
        const image = document.getElementById('image');
        const cropBtn = document.getElementById('cropBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resultSection = document.getElementById('resultSection');
        const result = document.getElementById('result');
        const imageStats = document.getElementById('imageStats');
        const originalSize = document.getElementById('originalSize');
        const status = document.getElementById('status');

        let cropper;
        let originalImageData;

        // Upload area click
        uploadArea.addEventListener('click', () => fileInput.click());

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = 'var(--primary)';
            uploadArea.style.background = 'rgba(99, 102, 241, 0.12)';
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = '';
            uploadArea.style.background = '';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '';
            uploadArea.style.background = '';
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                loadImage(file);
            }
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                loadImage(e.target.files[0]);
            }
        });

        function loadImage(file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                originalImageData = event.target.result;
                image.src = originalImageData;
                
                uploadArea.classList.add('has-image');
                imageWrapper.classList.add('active');
                
                if (cropper) {
                    cropper.destroy();
                }
                
                cropper = new Cropper(image, {
                    aspectRatio: NaN,
                    viewMode: 1,
                    dragMode: 'move',
                    autoCropArea: 0.8,
                    restore: false,
                    guides: true,
                    center: true,
                    highlight: false,
                    cropBoxMovable: true,
                    cropBoxResizable: true,
                    toggleDragModeOnDblclick: false,
                    responsive: true,
                    ready: function() {
                        const imgData = cropper.getImageData();
                        originalSize.textContent = `${Math.round(imgData.naturalWidth)} × ${Math.round(imgData.naturalHeight)} px`;
                        status.textContent = 'Sẵn sàng cắt';
                        imageStats.style.display = 'block';
                    }
                });
                
                cropBtn.disabled = false;
                resetBtn.disabled = false;
                resultSection.classList.remove('active');
            };
            reader.readAsDataURL(file);
        }

        cropBtn.addEventListener('click', () => {
            if (cropper) {
                const croppedCanvas = cropper.getCroppedCanvas({
                    maxWidth: 4096,
                    maxHeight: 4096,
                    fillColor: '#fff',
                    imageSmoothingEnabled: true,
                    imageSmoothingQuality: 'high',
                });
                
                const croppedImage = croppedCanvas.toDataURL('image/png');
                
                result.innerHTML = `
                    <img src="${croppedImage}" alt="Ảnh đã cắt">
                    <div class="stats">
                        <div class="stat-item">
                            <span class="stat-label">Kích thước mới</span>
                            <span class="stat-value">${croppedCanvas.width} × ${croppedCanvas.height} px</span>
                        </div>
                    </div>
                    <br>
                    <a href="${croppedImage}" download="anh-da-cat.png" class="download-link">
                        💾 Tải xuống ảnh
                    </a>
                `;
                
                resultSection.classList.add('active');
                
                // Smooth scroll to result
                setTimeout(() => {
                    resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 100);
                
                status.textContent = 'Đã cắt xong';
            }
        });

        resetBtn.addEventListener('click', () => {
            if (cropper) {
                cropper.reset();
                resultSection.classList.remove('active');
                status.textContent = 'Đã đặt lại';
                setTimeout(() => {
                    status.textContent = 'Sẵn sàng cắt';
                }, 2000);
            }
        });
    </script>
</body>
</html>
