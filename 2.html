<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyển Đổi Định Dạng Ảnh</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --background: #0f172a;
            --surface: #1e293b;
            --surface-light: #334155;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: rgba(148, 163, 184, 0.2);
            --success: #10b981;
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--background);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 40%);
            animation: glow 20s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes glow {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(5%, 5%) rotate(180deg); }
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        .main-card {
            background: var(--surface);
            border-radius: 20px;
            padding: 2.5rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        .main-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.5;
        }

        .upload-section {
            margin-bottom: 2rem;
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(99, 102, 241, 0.03);
            position: relative;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.08);
            transform: translateY(-2px);
        }

        .upload-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            opacity: 0.7;
        }

        .upload-text {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .upload-hint {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        #fileInput {
            display: none;
        }

        .file-info {
            display: none;
            background: var(--surface-light);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin-top: 1rem;
            animation: fadeIn 0.5s ease;
        }

        .file-info.active {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .file-name {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text);
            font-weight: 500;
        }

        .file-size {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .format-section {
            margin: 2rem 0;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .format-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
        }

        .format-option {
            background: var(--surface-light);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .format-option::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.1), transparent);
            transition: left 0.4s ease;
        }

        .format-option:hover::before {
            left: 100%;
        }

        .format-option:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .format-option.selected {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            color: white;
        }

        .format-option.selected .format-label {
            color: white;
        }

        .format-icon {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .format-label {
            font-weight: 600;
            color: var(--text);
            font-size: 0.95rem;
        }

        .convert-btn {
            width: 100%;
            padding: 1.2rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
            margin-top: 2rem;
        }

        .convert-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .convert-btn:hover::before {
            width: 400px;
            height: 400px;
        }

        .convert-btn span {
            position: relative;
            z-index: 1;
        }

        .convert-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(99, 102, 241, 0.4);
        }

        .convert-btn:active {
            transform: translateY(-1px);
        }

        .convert-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .result-section {
            display: none;
            margin-top: 2rem;
            animation: fadeInUp 0.8s ease;
        }

        .result-section.active {
            display: block;
        }

        .result-card {
            background: var(--surface-light);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            border: 1px solid var(--border);
        }

        .success-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .success-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.5rem;
        }

        .success-detail {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        .download-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            background: var(--success);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .download-link:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem 0.5rem;
            }

            h1 {
                font-size: 2.5rem;
            }

            .main-card {
                padding: 1.5rem;
            }

            .format-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔄 Chuyển Đổi Ảnh</h1>
            <p class="subtitle">Chuyển đổi định dạng ảnh dễ dàng & nhanh chóng</p>
        </header>

        <div class="main-card">
            <div class="upload-section">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">🖼️</div>
                    <div class="upload-text">Chọn ảnh cần chuyển đổi</div>
                    <div class="upload-hint">Hỗ trợ JPG, PNG, WEBP, BMP, GIF</div>
                    <input type="file" id="fileInput" accept="image/*">
                </div>
                <div class="file-info" id="fileInfo">
                    <div class="file-name">
                        <span>📄</span>
                        <span id="fileName">-</span>
                    </div>
                    <div class="file-size" id="fileSize">-</div>
                </div>
            </div>

            <div class="format-section">
                <div class="section-title">Chọn định dạng đích</div>
                <div class="format-grid">
                    <div class="format-option selected" data-format="image/jpeg" data-ext="jpg">
                        <div class="format-icon">📷</div>
                        <div class="format-label">JPG</div>
                    </div>
                    <div class="format-option" data-format="image/png" data-ext="png">
                        <div class="format-icon">🖼️</div>
                        <div class="format-label">PNG</div>
                    </div>
                    <div class="format-option" data-format="image/webp" data-ext="webp">
                        <div class="format-icon">🌐</div>
                        <div class="format-label">WEBP</div>
                    </div>
                    <div class="format-option" data-format="image/bmp" data-ext="bmp">
                        <div class="format-icon">🎨</div>
                        <div class="format-label">BMP</div>
                    </div>
                    <div class="format-option" data-format="image/gif" data-ext="gif">
                        <div class="format-icon">✨</div>
                        <div class="format-label">GIF</div>
                    </div>
                    <div class="format-option" data-format="image/jpeg" data-ext="jpeg">
                        <div class="format-icon">📸</div>
                        <div class="format-label">JPEG</div>
                    </div>
                </div>
            </div>

            <button class="convert-btn" id="convertBtn" disabled>
                <span>🔄 Chuyển đổi ngay</span>
            </button>

            <div class="result-section" id="resultSection">
                <div class="result-card">
                    <div class="success-icon">✅</div>
                    <div class="success-text">Chuyển đổi thành công!</div>
                    <div class="success-detail" id="resultDetail">-</div>
                    <a href="#" id="downloadLink" class="download-link">
                        💾 Tải xuống ảnh
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const formatOptions = document.querySelectorAll('.format-option');
        const convertBtn = document.getElementById('convertBtn');
        const resultSection = document.getElementById('resultSection');
        const resultDetail = document.getElementById('resultDetail');
        const downloadLink = document.getElementById('downloadLink');

        let selectedFile = null;
        let selectedFormat = 'image/jpeg';
        let selectedExt = 'jpg';

        // Upload area click
        uploadArea.addEventListener('click', () => fileInput.click());

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = 'var(--primary)';
            uploadArea.style.background = 'rgba(99, 102, 241, 0.12)';
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = '';
            uploadArea.style.background = '';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '';
            uploadArea.style.background = '';
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                loadFile(file);
            }
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                loadFile(e.target.files[0]);
            }
        });

        function loadFile(file) {
            selectedFile = file;
            fileName.textContent = file.name;
            
            const sizeKB = (file.size / 1024).toFixed(2);
            const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
            fileSize.textContent = file.size > 1024 * 1024 ? `${sizeMB} MB` : `${sizeKB} KB`;
            
            fileInfo.classList.add('active');
            convertBtn.disabled = false;
            resultSection.classList.remove('active');
        }

        // Format selection
        formatOptions.forEach(option => {
            option.addEventListener('click', () => {
                formatOptions.forEach(opt => opt.classList.remove('selected'));
                option.classList.add('selected');
                selectedFormat = option.dataset.format;
                selectedExt = option.dataset.ext;
            });
        });

        // Convert button
        convertBtn.addEventListener('click', () => {
            if (!selectedFile) {
                alert('Vui lòng chọn một ảnh trước!');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);

                    let quality = 0.92;
                    if (selectedFormat === 'image/png' || selectedFormat === 'image/gif' || selectedFormat === 'image/bmp') {
                        quality = undefined;
                    }

                    canvas.toBlob((blob) => {
                        const url = URL.createObjectURL(blob);
                        
                        // Get original name and replace extension
                        let originalName = selectedFile.name;
                        const lastDot = originalName.lastIndexOf('.');
                        const nameWithoutExt = lastDot > -1 ? originalName.substring(0, lastDot) : originalName;
                        const newFileName = nameWithoutExt + '.' + selectedExt;

                        // Update result
                        resultDetail.textContent = `Đã chuyển sang định dạng ${selectedExt.toUpperCase()}`;
                        downloadLink.href = url;
                        downloadLink.download = newFileName;
                        resultSection.classList.add('active');

                        // Smooth scroll to result
                        setTimeout(() => {
                            resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }, 100);
                    }, selectedFormat, quality);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(selectedFile);
        });
    </script>
</body>
</html>
